<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potvrzení účasti na svatbě</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-container { max-width: 650px; margin: 40px auto; padding: 35px; background: white; border-radius: 12px; box-shadow: 0 10px 35px rgba(179, 102, 102, 0.08); border: 1px solid #fdfbfb;}
        .guest-row { border-bottom: 1px solid #f2ecec; padding: 15px 0; }
        .success-msg { text-align: center; color: #4fa671; padding: 40px; font-family: 'Playfair Display', serif;}
        .help-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 15px; }
        .help-card { border: 1px solid #e0d8d8; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; background: white; color:#7a6a6a; font-weight:600;}
        .help-card:hover { border-color: #d18a8a; background: #faf8f8; }
        .help-card input { display: none; }
        .help-card.selected { background: #d18a8a; color: white; border-color: #d18a8a; }
        .child-age-row { display: flex; gap: 10px; margin-top: 8px; align-items: center; }
    </style>
</head>
<body>
    <div class="form-container" id="formConfig">
        <h2 style="text-align: center; margin-bottom:25px; display:flex; align-items:center; justify-content:center; gap:8px;">
            <span class="material-symbols-outlined" style="font-size:2rem;">volunteer_activism</span> Potvrzení účasti
        </h2>
        <form id="rsvpForm">
            <div class="input-group">
                <label style="font-weight:600; color:#7a6a6a;">Vaše Jméno a Příjmení:</label>
                <input type="text" id="mainGuestName" required placeholder="Např. Jan Novák">
            </div>
            <div class="input-group">
                <label style="font-weight:600; color:#7a6a6a;">Město, odkud přijedete:</label>
                <input type="text" id="mainGuestCity" required placeholder="Např. Praha">
            </div>

            <div id="additionalGuestsContainer" style="margin-top:20px;">
                <h3 style="font-size:1.1rem; margin-bottom:5px;">Další dospělé osoby s vámi</h3>
            </div>
            <button type="button" class="btn-secondary" onclick="addGuestRow()" style="width: 100%; margin-bottom: 25px;"><span class="material-symbols-outlined">person_add</span> Přidat dalšího dospělého</button>

            <!-- SEKCE DĚTI -->
            <div class="input-form">
                <label style="font-weight:600; color:#7a6a6a;"><span class="material-symbols-outlined icon-inline">child_care</span> Berete s sebou děti?</label>
                <input type="number" id="numChildren" value="0" min="0" onchange="renderChildrenAges()" style="width: 80px; margin-bottom: 10px;">
                <div id="childrenAgesContainer"></div>
            </div>

            <!-- Ubytování -->
            <div class="input-form">
                <label style="font-weight:600; color:#7a6a6a;"><span class="material-symbols-outlined icon-inline">bed</span> Potřebujete ubytování?</label>
                <select id="needsAcc" onchange="document.getElementById('roomsDiv').style.display = this.value === 'ano' ? 'block' : 'none'">
                    <option value="ne">Ne, nebudeme přespávat</option>
                    <option value="ano">Ano, prosíme o ubytování</option>
                </select>
                <div id="roomsDiv" style="display: none; margin-top: 15px;">
                    <label style="font-size:0.9rem; color:#7a6a6a;">Jaké pokoje/lůžka budete potřebovat?</label>
                    <input type="text" id="roomDetails" placeholder="Např. 1x dvoulůžkový a 1x přistýlka">
                </div>
            </div>

            <!-- Pomoc -->
            <div class="input-form">
                <label style="font-weight:600; color:#7a6a6a;"><span class="material-symbols-outlined icon-inline">handshake</span> Jste ochotni nám s něčím pomoci?</label>
                <div class="help-grid" id="dynamicHelpGrid">
                    <em>Načítám možnosti...</em>
                </div>
            </div>

            <!-- Speciální požadavky -->
            <div class="input-form">
                <label style="font-weight:600; color:#7a6a6a;"><span class="material-symbols-outlined icon-inline">comment</span> Speciální požadavky nebo vzkaz:</label>
                <p style="font-size: 0.85rem; color: #8ba6a2; margin-top: 0;">Máte nějaké diety, alergie, nebo nám chcete cokoliv vzkázat?</p>
                <textarea id="specialRequests" placeholder="Sem napište svůj požadavek..." style="width: 100%; height: 80px;"></textarea>
            </div>

            <button type="submit" style="width: 100%; padding: 15px; font-size: 1.1rem; margin-top: 25px;"><span class="material-symbols-outlined">send</span> Odeslat potvrzení</button>
        </form>
    </div>

    <div id="successArea" class="form-container hidden">
        <div class="success-msg">
            <span class="material-symbols-outlined" style="font-size: 4rem; margin-bottom:15px;">favorite</span>
            <h2>Děkujeme!</h2>
            <p style="font-family:'Nunito', sans-serif;">Vaše údaje byly úspěšně odeslány.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA4wHyLuyz8LN4RVxKoclF3CAXxKPg7xc",
            authDomain: "svatebniplanovac-f8ede.firebaseapp.com",
            projectId: "svatebniplanovac-f8ede",
            storageBucket: "svatebniplanovac-f8ede.firebasestorage.app",
            messagingSenderId: "1016595614269",
            appId: "1:1016595614269:web:f1c1dddbf8bd2228e43854"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const ownerUid = urlParams.get('uid');

        async function loadCategories() {
            const grid = document.getElementById('dynamicHelpGrid');
            let cats = ['Pečení / Dorty', 'Jídlo', 'Fyzická příprava', 'Výzdoba', 'Doprava', 'Koordinace', 'Hudba / Program'];
            
            if(ownerUid) {
                try {
                    const docSnap = await getDoc(doc(db, "nastaveni", ownerUid));
                    if (docSnap.exists() && docSnap.data().helperCategories && docSnap.data().helperCategories.length > 0) {
                        cats = docSnap.data().helperCategories.map(c => c.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, '').trim()); 
                    }
                } catch(e) { console.error("Nelze načíst kategorie.", e); }
            }
            grid.innerHTML = '';
            cats.forEach(c => grid.innerHTML += `<label class="help-card"><input type="checkbox" name="help" value="${c}" onchange="toggleCard(this)"> ${c}</label>`);
        }
        
        loadCategories();

        window.toggleCard = (checkbox) => {
            if (checkbox.checked) checkbox.parentElement.classList.add('selected');
            else checkbox.parentElement.classList.remove('selected');
        };

        window.renderChildrenAges = () => {
            const num = document.getElementById('numChildren').value;
            const cont = document.getElementById('childrenAgesContainer');
            cont.innerHTML = '';
            for(let i=0; i<num; i++) {
                cont.innerHTML += `
                    <div class="child-age-row">
                        <label>Věk dítěte ${i+1}:</label>
                        <select class="child-age-select">
                            <option value="Malé (0-3)">Malé (0-3 roky)</option>
                            <option value="Střední (4-10)">Střední (4-10 let)</option>
                            <option value="Velké (11+)">Velké (11+ let)</option>
                        </select>
                    </div>`;
            }
        };

        window.addGuestRow = () => {
            const container = document.getElementById('additionalGuestsContainer');
            const div = document.createElement('div');
            div.className = 'guest-row';
            div.innerHTML = `<input type="text" class="add-name" placeholder="Jméno a příjmení" style="width:100%;">`;
            container.appendChild(div);
        }

        document.getElementById('rsvpForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerHTML = '<span class="material-symbols-outlined">hourglass_empty</span> Odesílám...';
            submitBtn.disabled = true;

            const helpValues = Array.from(document.querySelectorAll('input[name="help"]:checked')).map(cb => cb.value);
            const mainName = document.getElementById('mainGuestName').value;
            const city = document.getElementById('mainGuestCity').value;
            const needsAcc = document.getElementById('needsAcc').value === 'ano';
            const roomDetails = document.getElementById('roomDetails').value || '';
            const numChildren = document.getElementById('numChildren').value;
            const childAges = Array.from(document.querySelectorAll('.child-age-select')).map(s => s.value);
            const specialReq = document.getElementById('specialRequests').value || '';
            
            const allNames = [mainName];
            document.querySelectorAll('.add-name').forEach(input => { if(input.value) allNames.push(input.value); });
            const todayISO = new Date().toISOString(); 

            try {
                for(let i = 0; i < allNames.length; i++) {
                    await addDoc(collection(db, "hoste"), {
                        name: allNames[i], city: city, side: 'Společný', status: 'Potvrzeno',
                        isHelper: helpValues.length > 0, helperTask: helpValues.join(", "), helperStatus: helpValues.length > 0 ? 'pending' : '', helperAgreed: false,
                        needsAcc: needsAcc, accPlace: '', accRoom: needsAcc ? (i === 0 ? `Požadavek: ${roomDetails}` : 'Skupina s ' + mainName) : '', accStatus: needsAcc ? 'pending' : '',
                        userId: ownerUid, submittedDate: todayISO, numChildren: i === 0 ? Number(numChildren) : 0, childrenAges: i === 0 ? childAges : [], specialReq: i === 0 ? specialReq : ''
                    });
                }
                document.getElementById('formConfig').classList.add('hidden');
                document.getElementById('successArea').classList.remove('hidden');
            } catch (err) { 
                alert("Došlo k chybě při odesílání formuláře.");
                submitBtn.innerHTML = '<span class="material-symbols-outlined">send</span> Odeslat potvrzení';
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
