<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potvrzení účasti na svatbě</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #fdf2f3; }
        .form-container { max-width: 600px; margin: 30px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .guest-row { border-bottom: 1px solid #eee; padding: 15px 0; }
        .success-msg { text-align: center; color: #27ae60; padding: 40px; }
        .help-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .help-card { border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; background: white; }
        .help-card:hover { border-color: #e5b2b2; background: #fdf2f3; }
        .help-card input { display: none; }
        .help-card.selected { background: #e5b2b2; color: white; border-color: #d49595; font-weight: bold; }
        .child-age-row { display: flex; gap: 10px; margin-top: 5px; align-items: center; }
    </style>
</head>
<body>
    <div class="form-container" id="formConfig">
        <h2 style="text-align: center; color: #e5b2b2;">💍 Potvrzení účasti</h2>
        <form id="rsvpForm">
            <div class="input-group">
                <label>Vaše Jméno a Příjmení:</label>
                <input type="text" id="mainGuestName" required placeholder="Např. Jan Novák">
            </div>
            <div class="input-group">
                <label>Město, odkud přijedete:</label>
                <input type="text" id="mainGuestCity" required placeholder="Např. Praha">
            </div>

            <div id="additionalGuestsContainer">
                <h3>Další dospělé osoby s vámi</h3>
            </div>
            <button type="button" class="btn-secondary" onclick="addGuestRow()" style="width: 100%; margin-bottom: 20px;">+ Přidat dalšího dospělého</button>

            <div class="input-form" style="background: #fff8f9; border: 1px solid #fce4ec; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                <label><strong>Berete s sebou děti?</strong></label>
                <input type="number" id="numChildren" value="0" min="0" onchange="renderChildrenAges()" style="width: 80px; margin-bottom: 10px;">
                <div id="childrenAgesContainer"></div>
            </div>

            <div class="input-form" style="background: #fafafa; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                <label><strong>Potřebujete ubytování?</strong></label>
                <select id="needsAcc" onchange="document.getElementById('roomsDiv').style.display = this.value === 'ano' ? 'block' : 'none'">
                    <option value="ne">Ne, nebudeme přespávat</option>
                    <option value="ano">Ano, prosíme o ubytování</option>
                </select>
                <div id="roomsDiv" style="display: none; margin-top: 10px;">
                    <label>Jaké pokoje/lůžka budete potřebovat?</label>
                    <input type="text" id="roomDetails" placeholder="Např. 1x dvoulůžkový a 1x přistýlka">
                </div>
            </div>

            <div style="background: #fdf9f9; padding: 15px; border-radius: 8px; border: 1px solid #fce4ec;">
                <label><strong>Jste ochotni nám s něčím pomoci?</strong></label>
                <div class="help-grid" id="dynamicHelpGrid"></div>
            </div>

            <button type="submit" style="width: 100%; padding: 15px; font-size: 1.1rem; margin-top: 20px;">Odeslat potvrzení</button>
        </form>
    </div>

    <div id="successArea" class="form-container hidden">
        <div class="success-msg"><h1>❤️</h1><h2>Děkujeme!</h2><p>Vaše údaje byly odeslány.</p></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA4wHyLuyz8LN4RVxKoclF3CAXxKPg7xc",
            authDomain: "svatebniplanovac-f8ede.firebaseapp.com",
            projectId: "svatebniplanovac-f8ede",
            storageBucket: "svatebniplanovac-f8ede.firebasestorage.app",
            messagingSenderId: "1016595614269",
            appId: "1:1016595614269:web:f1c1dddbf8bd2228e43854"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const ownerUid = urlParams.get('uid');

        async function loadCategories() {
            const grid = document.getElementById('dynamicHelpGrid');
            let cats = ['🎂 Pečení/Dorty', '🎀 Výzdoba', '🚗 Doprava', '📋 Koordinace', '🎵 Hudba/Program'];
            if(ownerUid) {
                try {
                    const docSnap = await getDoc(doc(db, "nastaveni", ownerUid));
                    if (docSnap.exists() && docSnap.data().helperCategories && docSnap.data().helperCategories.length > 0) {
                        cats = docSnap.data().helperCategories;
                    }
                } catch(e) { console.error(e); }
            }
            grid.innerHTML = '';
            cats.forEach(c => grid.innerHTML += `<label class="help-card"><input type="checkbox" name="help" value="${c}" onchange="toggleCard(this)"> ${c}</label>`);
        }
        loadCategories();

        window.toggleCard = (checkbox) => {
            if (checkbox.checked) checkbox.parentElement.classList.add('selected');
            else checkbox.parentElement.classList.remove('selected');
        };

        window.renderChildrenAges = () => {
            const num = document.getElementById('numChildren').value;
            const cont = document.getElementById('childrenAgesContainer');
            cont.innerHTML = '';
            for(let i=0; i<num; i++) {
                cont.innerHTML += `
                    <div class="child-age-row">
                        <label>Věk dítěte ${i+1}:</label>
                        <select class="child-age-select">
                            <option value="Malé (0-3)">Malé (0-3 roky)</option>
                            <option value="Střední (4-10)">Střední (4-10 let)</option>
                            <option value="Velké (11+)">Velké (11+ let)</option>
                        </select>
                    </div>`;
            }
        };

        window.addGuestRow = () => {
            const container = document.getElementById('additionalGuestsContainer');
            const div = document.createElement('div');
            div.className = 'guest-row';
            div.innerHTML = `<input type="text" class="add-name" placeholder="Jméno a příjmení" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:8px;">`;
            container.appendChild(div);
        }

        document.getElementById('rsvpForm').onsubmit = async (e) => {
            e.preventDefault();
            const helpValues = Array.from(document.querySelectorAll('input[name="help"]:checked')).map(cb => cb.value);
            const mainName = document.getElementById('mainGuestName').value;
            const city = document.getElementById('mainGuestCity').value;
            const needsAcc = document.getElementById('needsAcc').value === 'ano';
            const roomDetails = document.getElementById('roomDetails').value || '';
            const numChildren = document.getElementById('numChildren').value;
            const childAges = Array.from(document.querySelectorAll('.child-age-select')).map(s => s.value);
            
            const allNames = [mainName];
            document.querySelectorAll('.add-name').forEach(input => { if(input.value) allNames.push(input.value); });
            const todayISO = new Date().toISOString(); 

            try {
                for(let i = 0; i < allNames.length; i++) {
                    await addDoc(collection(db, "hoste"), {
                        name: allNames[i],
                        city: city,
                        side: 'Společný',
                        status: 'Potvrzeno',
                        isHelper: helpValues.length > 0,
                        helperTask: helpValues.join(", "),
                        helperStatus: helpValues.length > 0 ? 'pending' : '',
                        needsAcc: needsAcc,
                        accPlace: '',
                        accRoom: needsAcc ? (i === 0 ? `Požadavek: ${roomDetails}` : 'Skupina s ' + mainName) : '',
                        accStatus: needsAcc ? 'pending' : '',
                        userId: ownerUid,
                        submittedDate: todayISO,
                        numChildren: i === 0 ? numChildren : 0,
                        childrenAges: i === 0 ? childAges : []
                    });
                }
                document.getElementById('formConfig').classList.add('hidden');
                document.getElementById('successArea').classList.remove('hidden');
            } catch (err) { alert(err.message); }
        };
    </script>
</body>
</html>
