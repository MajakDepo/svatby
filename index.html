<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svatební Plánovač</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>💍 Náš Svatební Plánovač</h1>
    </header>

    <main>
        <section id="authSection" class="card text-center">
            <h2>Přihlášení / Registrace</h2>
            <div class="input-group">
                <input type="email" id="emailInput" placeholder="E-mail">
            </div>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Heslo">
            </div>
            <div class="button-group">
                <button id="loginBtn">Přihlásit se</button>
                <button id="registerBtn" class="btn-secondary">Vytvořit účet</button>
            </div>
        </section>

        <div id="appSection" class="hidden">
            <nav class="app-nav">
                <ul>
                    <li><a href="#todo">Úkoly</a></li>
                    <li><a href="#guests">Hosté</a></li>
                    <li><a href="#budget">Rozpočet</a></li>
                </ul>
                <button id="logoutBtn" class="btn-small">Odhlásit se</button>
            </nav>

            <section id="todo" class="card">
                <h2>To-Do List</h2>
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Co je potřeba udělat?">
                    <button id="addBtn">Přidat</button>
                </div>
                <ul id="taskList"></ul>
            </section>

            <section id="guests" class="card">
                <h2>Seznam hostů</h2>
                <div class="input-form">
                    <input type="text" id="guestName" placeholder="Jméno hosta">
                    <select id="guestSide">
                        <option value="Nevěsta">Strana Nevěsty</option>
                        <option value="Ženich">Strana Ženicha</option>
                    </select>
                    <button id="addGuestBtn">Přidat</button>
                </div>
                <div class="stats">
                    <div class="stat-box">Hostů: <strong id="totalGuests">0</strong></div>
                    <div class="stat-box">Potvrzeno: <strong id="confirmedGuests">0</strong></div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Jméno</th><th>Strana</th><th>Stav</th><th>Akce</th></tr>
                        </thead>
                        <tbody id="guestTableBody"></tbody>
                    </table>
                </div>
            </section>

            <section id="budget" class="card">
                <h2>Rozpočet</h2>
                <div class="input-form">
                    <input type="text" id="budgetItemName" placeholder="Položka (např. Prstýnky)">
                    <input type="number" id="budgetEstimated" placeholder="Odhad (Kč)">
                    <button id="addBudgetBtn">Přidat</button>
                </div>
                <div class="stats">
                    <div class="stat-box">Plánováno: <strong id="totalEstimated">0 Kč</strong></div>
                    <div class="stat-box">Utraceno: <strong id="totalActual">0 Kč</strong></div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Položka</th><th>Odhad</th><th>Skutečnost</th><th>Akce</th></tr>
                        </thead>
                        <tbody id="budgetTableBody"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
